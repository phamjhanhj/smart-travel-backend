[pytest]
# Chạy test từ thư mục gốc project
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Thêm project root vào sys.path — giải quyết "No module named 'app'" khi gọi pytest trực tiếp
pythonpath = .

# Hiện output chi tiết
addopts =
    -v
    --tb=short
    --no-header
    -rN

# Màu sắc output
log_cli = false
